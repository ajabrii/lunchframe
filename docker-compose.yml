networks:
  lunchframe_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kokoro_models:

services:

  # ─── Reverse Proxy ──────────────────────────────────────
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - gateway
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost/api/v1
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── API Gateway ────────────────────────────────────────
  gateway:
    build: ./gateway
    environment:
      - DATABASE_URL=postgresql+asyncpg://lunchframe:secret@postgres:5432/lunchframe
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CRAWLER_URL=http://crawler:8001
      - SCRIPTGEN_URL=http://scriptgen:8002
      - TTS_URL=http://tts:8004
      - RENDERER_URL=http://renderer:8003
      - MINIO_URL=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── Crawler Service ────────────────────────────────────
  crawler:
    build: ./crawler
    environment:
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── Script Generation Service ──────────────────────────
  scriptgen:
    build: ./scriptgen
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
      - GROQ_VISION_MODEL=llama-4-scout-17b-16e-instruct
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── TTS Service ────────────────────────────────────────
  tts:
    build: ./tts
    volumes:
      - kokoro_models:/models
    environment:
      - KOKORO_MODEL_PATH=/models/kokoro-v1.0
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── Renderer Service ──────────────────────────────────
  renderer:
    build: ./renderer
    environment:
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - REMOTION_CONCURRENCY=2
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── Celery Worker ──────────────────────────────────────
  worker:
    build: ./worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://lunchframe:secret@postgres:5432/lunchframe
      - REDIS_URL=redis://redis:6379/0
      - CRAWLER_URL=http://crawler:8001
      - SCRIPTGEN_URL=http://scriptgen:8002
      - TTS_URL=http://tts:8004
      - RENDERER_URL=http://renderer:8003
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lunchframe
      POSTGRES_USER: lunchframe
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - lunchframe_net
    restart: unless-stopped

  # ─── MinIO (S3-compatible storage) ─────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - lunchframe_net
    restart: unless-stopped
